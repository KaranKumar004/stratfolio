<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stratfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); width: 100%; max-width: 400px; text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-family: inherit; }
        input:focus { outline: none; border-color: #6366f1; }
        .btn { width: 100%; padding: 14px; background: white; color: #667eea; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: transform 0.2s; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); }
        .link { color: #c7d2fe; text-decoration: none; font-size: 14px; display: inline-block; margin-top: 20px; }
        .link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Application Logo (Optional) -->
        <a href="/" style="display:inline-block; margin-bottom: 20px;">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:48px; height:48px;">
                <rect x="4" y="4" width="40" height="40" rx="8" fill="white" fill-opacity="0.1"/>
                <path d="M14 18L24 12L34 18V32L24 38L14 32V18Z" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="24" cy="25" r="4" fill="white"/>
                <path d="M20 25L24 21L28 25L24 29L20 25Z" fill="#6366f1"/>
            </svg>
        </a>
        <h2 style="margin-bottom: 30px; font-size: 28px;">Welcome Back</h2>
        
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            if(error) {
                document.write(`<p style="color: #fca5a5; margin-bottom: 15px;">${error}</p>`);
            }
        </script>
        
        <form action="/api/login" method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Log In</button>
        </form>
        <a href="/register" class="link">Don't have an account? Sign up</a>
    </div>
</body>
</html>
