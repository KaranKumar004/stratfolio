<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratfolio Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f8fafc;
        }

        .wrapper {
            display: flex;
            height: 100vh;
        }

        .form-section {
            width: 40%;
            padding: 30px 40px;
            overflow-y: auto;
            background: white;
            border-right: 1px solid #e2e8f0;
        }

        .preview-section {
            width: 60%;
            padding: 0;
            overflow-y: auto;
            background: #0f172a;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }

        .back-btn {
            padding: 8px 16px;
            background: #f1f5f9;
            color: #475569;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #e2e8f0;
        }

        h3 {
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 18px;
            color: #0f172a;
            font-weight: 600;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 6px;
        }

        .required::after {
            content: '*';
            color: #ef4444;
            margin-left: 4px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6366f1;
        }

        input.error, textarea.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: -12px;
            margin-bottom: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        button {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .primary-btn {
            background: #0f172a;
            color: white;
        }

        .primary-btn:hover:not(:disabled) {
            background: #1e293b;
        }

        .secondary-btn {
            background: #6366f1;
            color: white;
        }

        .secondary-btn:hover:not(:disabled) {
            background: #4f46e5;
        }

        .add-btn {
            background: #f1f5f9;
            color: #475569;
            width: 100%;
            margin-bottom: 10px;
        }

        .add-btn:hover {
            background: #e2e8f0;
        }

        .remove-btn {
            background: #fee2e2;
            color: #ef4444;
            padding: 6px 12px;
            font-size: 12px;
            margin-top: 10px;
        }

        .remove-btn:hover {
            background: #fecaca;
        }

        .ai-enhance-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .ai-enhance-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .ai-loading {
            font-size: 12px;
            color: #6366f1;
            display: none;
            margin-top: -12px;
            margin-bottom: 12px;
        }

        .ai-loading.show {
            display: block;
        }

        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 25px 0;
        }

        .section-block {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 16px;
            position: relative;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-weight: 600;
            color: #0f172a;
            font-size: 15px;
        }

        .image-preview {
            margin-top: 10px;
            margin-bottom: 16px;
            display: none;
        }

        .image-preview.show {
            display: block;
        }

        .image-preview img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #e2e8f0;
        }

        .form-actions {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 20px 0;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .form-actions button {
            flex: 1;
        }

        .preview-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            opacity: 0.6;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .help-text {
            font-size: 12px;
            color: #64748b;
            margin-top: -12px;
            margin-bottom: 12px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .wrapper {
                flex-direction: column;
            }

            .form-section, .preview-section {
                width: 100%;
                height: auto;
            }

            .preview-section {
                min-height: 500px;
            }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- LEFT FORM -->
    <div class="form-section">

        <div class="header">
            <div class="logo">✨ Stratfolio</div>
            <a href="/" class="back-btn">← Home</a>
        </div>

        <form id="portfolioForm" action="/generate" method="post" enctype="multipart/form-data">
            
            <label>Choose Template</label>
            <select name="template" id="templateSelect">
                <optgroup label="Professional">
                    <option value="executive_dark.html">🌙 Executive Dark</option>
                    <option value="executive_light.html">☀️ Executive Light</option>
                    <option value="professional_blue.html">💼 Professional Blue</option>
                </optgroup>
                <optgroup label="Modern & Clean">
                    <option value="minimal_clean.html">✨ Minimal Clean</option>
                    <option value="glassmorphism.html">💎 Glassmorphism</option>
                    <option value="modern_green.html">🌿 Modern Green</option>
                    <option value="paper_fold.html">📄 Paper Fold</option>
                </optgroup>
                <optgroup label="Creative & Bold">
                    <option value="creative_bold.html">🎨 Creative Bold</option>
                    <option value="magazine_editorial.html">📰 Magazine Editorial</option>
                    <option value="luxury_gold.html">👑 Luxury Gold</option>
                    <option value="art_deco.html">✦ Art Deco</option>
                    <option value="soft_pastel.html">🌸 Soft Pastel</option>
                </optgroup>
                <optgroup label="Tech & Futuristic">
                    <option value="neon_cyberpunk.html">⚡ Neon Cyberpunk</option>
                    <option value="retro_terminal.html">💻 Retro Terminal</option>
                    <option value="cosmic_space.html">🌌 Cosmic Space</option>
                    <option value="brutalist.html">⬛ Brutalist</option>
                </optgroup>
            </select>

            <h3>Basic Information</h3>

            <label class="required">Name</label>
            <input type="text" name="name" id="name" required>
            <div class="error-message" id="name-error">Name is required</div>

            <label class="required">Professional Title</label>
            <input type="text" name="title" id="title" placeholder="e.g. Full Stack Developer" required>
            <div class="error-message" id="title-error">Title is required</div>

            <label class="required">Professional Summary</label>
            <textarea name="summary" id="summary" rows="4" placeholder="Write a brief introduction about yourself and your expertise..." required></textarea>
            <div class="error-message" id="summary-error">Summary is required</div>
            
            <button type="button" class="ai-enhance-btn" onclick="enhanceSummary()">
                <span>✨</span> AI Enhance Summary
            </button>
            <div id="ai-loading" class="ai-loading">🤖 Enhancing your summary...</div>

            <label>Skills (comma separated)</label>
            <input type="text" name="skills" placeholder="e.g. JavaScript, Python, React, Node.js">
            <p class="help-text">Separate multiple skills with commas</p>

            <label>Profile Image</label>
            <input type="file" name="profile_image" id="profileImage" accept="image/*">
            <div class="image-preview" id="imagePreview">
                <img id="previewImg" src="" alt="Profile preview">
            </div>

            <h3>Contact Information</h3>

            <label>Email</label>
            <input type="email" name="email" placeholder="your.email@example.com">

            <label>Phone</label>
            <input type="tel" name="phone" placeholder="+1 (123) 456-7890">

            <label>LinkedIn</label>
            <input type="url" name="linkedin" placeholder="https://linkedin.com/in/yourprofile">

            <label>GitHub</label>
            <input type="url" name="github" placeholder="https://github.com/yourusername">

            <label>Website/Portfolio</label>
            <input type="url" name="website" placeholder="https://yourwebsite.com">

            <h3>Experience</h3>

            <div id="experience-container">
                <div class="section-block experience-block">
                    <div class="section-header">
                        <span class="section-title">Position 1</span>
                    </div>

                    <label>Job Title</label>
                    <input type="text" name="job_title" placeholder="e.g. Software Engineer">

                    <label>Company</label>
                    <input type="text" name="company" placeholder="e.g. Tech Corp">

                    <label>Duration</label>
                    <input type="text" name="duration" placeholder="e.g. Jan 2022 - Present">

                    <label>Description</label>
                    <textarea name="job_description" rows="3" placeholder="Describe your role and achievements..."></textarea>
                </div>
            </div>

            <button type="button" class="add-btn" onclick="addExperience()">+ Add Another Position</button>

            <h3>Education</h3>

            <div id="education-container">
                <div class="section-block education-block">
                    <div class="section-header">
                        <span class="section-title">Education 1</span>
                    </div>

                    <label>Degree/Certification</label>
                    <input type="text" name="edu_degree" placeholder="e.g. B.S. Computer Science">

                    <label>Institution</label>
                    <input type="text" name="edu_institution" placeholder="e.g. University of Technology">

                    <label>Year</label>
                    <input type="text" name="edu_year" placeholder="e.g. 2018 - 2022">
                </div>
            </div>

            <button type="button" class="add-btn" onclick="addEducation()">+ Add Another Education</button>

            <div class="form-actions">
                <button type="submit" class="primary-btn">Generate Portfolio</button>
                <button type="button" formaction="/download" formmethod="post" class="secondary-btn" onclick="downloadPortfolio()">
                    Download HTML
                </button>
            </div>

        </form>

    </div>

    <!-- RIGHT PREVIEW -->
    <div class="preview-section" id="preview">
        <div class="preview-loading">
            <div class="spinner"></div>
            <div>Live preview will appear here...</div>
        </div>
    </div>

</div>


<script>

let previewTimeout;

// Add Experience Block
function addExperience() {
    const container = document.getElementById("experience-container");
    const count = container.children.length + 1;

    const block = document.createElement("div");
    block.className = "section-block experience-block";

    block.innerHTML = `
        <div class="section-header">
            <span class="section-title">Position ${count}</span>
            <button type="button" class="remove-btn" onclick="removeBlock(this)">Remove</button>
        </div>

        <label>Job Title</label>
        <input type="text" name="job_title" placeholder="e.g. Software Engineer">

        <label>Company</label>
        <input type="text" name="company" placeholder="e.g. Tech Corp">

        <label>Duration</label>
        <input type="text" name="duration" placeholder="e.g. Jan 2022 - Present">

        <label>Description</label>
        <textarea name="job_description" rows="3" placeholder="Describe your role and achievements..."></textarea>
    `;

    container.appendChild(block);
    updatePreview();
}

// Add Education Block
function addEducation() {
    const container = document.getElementById("education-container");
    const count = container.children.length + 1;

    const block = document.createElement("div");
    block.className = "section-block education-block";

    block.innerHTML = `
        <div class="section-header">
            <span class="section-title">Education ${count}</span>
            <button type="button" class="remove-btn" onclick="removeBlock(this)">Remove</button>
        </div>

        <label>Degree/Certification</label>
        <input type="text" name="edu_degree" placeholder="e.g. B.S. Computer Science">

        <label>Institution</label>
        <input type="text" name="edu_institution" placeholder="e.g. University of Technology">

        <label>Year</label>
        <input type="text" name="edu_year" placeholder="e.g. 2018 - 2022">
    `;

    container.appendChild(block);
    updatePreview();
}

// Remove Block
function removeBlock(btn) {
    const block = btn.closest('.section-block');
    block.remove();
    updatePreview();
}

// Image Preview
document.getElementById('profileImage').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('imagePreview').classList.add('show');
        }
        reader.readAsDataURL(file);
    }
});

// AI Summary Enhancement
function enhanceSummary() {
    const summaryField = document.getElementById('summary');
    const loading = document.getElementById("ai-loading");
    const btn = event.target.closest('button');

    if (!summaryField.value.trim()) {
        alert('Please write a summary first before enhancing it.');
        return;
    }

    const formData = new FormData();
    formData.append("summary", summaryField.value);

    btn.disabled = true;
    loading.classList.add('show');

    fetch("/enhance-summary", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        loading.classList.remove('show');
        btn.disabled = false;

        if (data.enhanced) {
            summaryField.value = data.enhanced;
            updatePreview();
        }
        
        if (data.error) {
            console.warn('AI enhancement failed:', data.error);
        }
    })
    .catch(() => {
        loading.classList.remove('show');
        btn.disabled = false;
        alert('AI enhancement is currently unavailable. Please try again later.');
    });
}

// Form Validation
function validateForm() {
    let isValid = true;

    const name = document.getElementById('name');
    const title = document.getElementById('title');
    const summary = document.getElementById('summary');

    // Reset errors
    document.querySelectorAll('.error-message').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('input, textarea').forEach(el => el.classList.remove('error'));

    if (!name.value.trim()) {
        name.classList.add('error');
        document.getElementById('name-error').classList.add('show');
        isValid = false;
    }

    if (!title.value.trim()) {
        title.classList.add('error');
        document.getElementById('title-error').classList.add('show');
        isValid = false;
    }

    if (!summary.value.trim()) {
        summary.classList.add('error');
        document.getElementById('summary-error').classList.add('show');
        isValid = false;
    }

    return isValid;
}

// Live Preview with Debouncing
function updatePreview() {
    clearTimeout(previewTimeout);
    
    previewTimeout = setTimeout(() => {
        const formData = new FormData(document.getElementById('portfolioForm'));

        fetch("/preview", {
            method: "POST",
            body: formData
        })
        .then(response => response.text())
        .then(html => {
            document.getElementById("preview").innerHTML = html;
        })
        .catch(error => {
            console.error('Preview error:', error);
        });
    }, 500); // 500ms debounce
}

// Form Submit
document.getElementById('portfolioForm').addEventListener('submit', function(e) {
    if (!validateForm()) {
        e.preventDefault();
        alert('Please fill in all required fields (Name, Title, Summary)');
    }
});

// Download Portfolio
function downloadPortfolio() {
    if (!validateForm()) {
        alert('Please fill in all required fields (Name, Title, Summary)');
        return;
    }

    const form = document.getElementById('portfolioForm');
    const formData = new FormData(form);

    fetch('/download', {
        method: 'POST',
        body: formData
    })
    .then(response => response.blob())
    .then(blob => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${formData.get('name').toLowerCase().replace(/\s+/g, '_')}_portfolio.html`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    })
    .catch(error => {
        console.error('Download error:', error);
        alert('Failed to download portfolio. Please try again.');
    });
}

// Auto-update preview on input
document.getElementById('portfolioForm').addEventListener('input', updatePreview);
document.getElementById('templateSelect').addEventListener('change', updatePreview);

// Initial preview
updatePreview();

</script>

</body>
</html>
